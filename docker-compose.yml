version: '3.8'

services:
  eureka-server:
    build:
      context: ../Eureka-Server
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-local}/iers-eureka-server:${EUREKA_IMAGE_TAG:-latest}
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SERVER_PORT=8761
      - EUREKA_INSTANCE_HOSTNAME=eureka-server
    networks:
      - iers-net

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=IERS
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - iers-net

  authentication-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-local}/iers-authentication:${AUTH_IMAGE_TAG:-latest}
    container_name: authentication-service
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
      - postgres-db
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/IERS
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - iers-net

volumes:
  pgdata:

networks:
  iers-net:
    driver: bridge
